          - generic [ref=e290]: ">"
          - listitem [ref=e291]: Overview
        - heading "Antigravity CLI Overview" [level=1] [ref=e293]
        - paragraph [ref=e295]: The Antigravity CLI is the lightweight Terminal User Interface (TUI) surface of Antigravity. It brings the same core agentic capabilities as Antigravity 2.0—including multi-step reasoning, multi-file editing, tool calling, and conversation history—directly to your terminal.
        - paragraph [ref=e297]: The CLI is the ideal tool for keyboard-centric developers and remote SSH workflows, optimized for speed and low resource overhead.
        - 'heading "Philosophical Split: CLI vs. Antigravity 2.0" [level=3] [ref=e299]'
        - paragraph [ref=e301]: Antigravity CLI complements Antigravity 2.0 as a terminal-first alternative.
        - list [ref=e303]:
          - listitem [ref=e304]:
            - generic [ref=e305]:
              - strong [ref=e306]: CLI
              - text: ":"
            - text: Optimized for speed, keyboard efficiency, and low overhead.
          - listitem [ref=e307]:
            - generic [ref=e308]:
              - strong [ref=e309]: Antigravity 2.0
              - text: ":"
            - text: Optimized for comprehensiveness, visual orchestration, and project management.
        - paragraph [ref=e311]:
          - strong [ref=e312]: Integration Features
        - list [ref=e314]:
          - listitem [ref=e315]:
            - generic [ref=e316]:
              - strong [ref=e317]: Shared Agent Harness
              - text: ":"
            - text: Both products run on the same core agent engine. Any improvements to reasoning or tool use automatically apply to both.
          - listitem [ref=e318]:
            - generic [ref=e319]:
              - strong [ref=e320]: Shared Settings
              - text: ":"
            - text: Core preferences and permissions are shared. Changing a setting in the CLI updates it in the Antigravity, and vice versa.
          - listitem [ref=e321]:
            - generic [ref=e322]:
              - strong [ref=e323]: Conversation Export
              - text: ":"
            - text: While conversations are separate by default, you can easily export a CLI conversation to Antigravity 2.0 to continue with the agent-first interface.
        - heading "Getting Started & Migration" [level=3] [ref=e325]
        - paragraph [ref=e327]:
          - text: To install the CLI, follow the
          - link "Installation Guide" [ref=e328] [cursor=pointer]:
            - /url: /docs/cli-getting-started
          - text: .
        - heading "Migrating from Gemini CLI" [level=3] [ref=e330]
        - paragraph [ref=e332]:
          - text: If you are transitioning from Gemini CLI, the onboarding process supports a one-time import to automatically migrate your existing Gemini CLI extensions, skills, and settings. To learn more, read
          - link "Migrating from Gemini CLI" [ref=e333] [cursor=pointer]:
            - /url: /docs/gcli-migration
          - text: .
