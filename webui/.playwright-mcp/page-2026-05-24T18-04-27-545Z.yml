        - heading "Authentication" [level=3] [ref=e333]
        - paragraph [ref=e335]: Antigravity CLI attempts to authenticate you silently using your operating system's secure keyring. If no saved session is found, it will fall back to a browser-based Google Sign-In.
        - list [ref=e337]:
          - listitem [ref=e338]:
            - generic [ref=e339]:
              - strong [ref=e340]: Local Machine
              - text: ":"
            - text: The CLI will automatically open your default browser to the Google Sign-In page.
          - listitem [ref=e341]:
            - generic [ref=e342]:
              - strong [ref=e343]: Remote / SSH Session
              - text: ":"
            - text: The CLI will detect that you are in an SSH session and print a secure authorization URL. Copy this URL into your local browser to sign in, and then paste the resulting authorization code back into the CLI prompt.
          - listitem [ref=e344]:
            - generic [ref=e345]:
              - strong [ref=e346]: Logging Out
              - text: ":"
            - generic [ref=e347]:
              - text: To terminate your session and remove saved credentials, run the command
              - code [ref=e348]: /logout
              - text: .
        - paragraph [ref=e350]:
          - text: To login with your enterprise credentials, connect your GCP project as you onboard. For more information, visit the
          - link "Enterprise Documentation Page" [ref=e351] [cursor=pointer]:
            - /url: /docs/enterprise
          - text: .
