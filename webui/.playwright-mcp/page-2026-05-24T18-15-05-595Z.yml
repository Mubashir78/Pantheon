        - heading "Antigravity CLI Features" [level=1] [ref=e293]
        - heading "Plugins" [level=3] [ref=e295]
        - paragraph [ref=e297]:
          - strong [ref=e298]: How Plugins Work
          - text: Plugins are namespaced bundles that can contain skills, agents, rules, MCP servers, and hooks as a single deployable unit.
        - paragraph [ref=e300]:
          - text: When you install a plugin, the CLI stages the files in your home directory under
          - code [ref=e301]: ~/.gemini/antigravity-cli/plugins/<plugin_name>/
          - text: . The Antigravity Agent automatically discovers and loads these staged customizations.
        - generic [ref=e304]:
          - button "content_copy" [ref=e305] [cursor=pointer]
          - code [ref=e308]
        - paragraph [ref=e310]:
          - strong [ref=e311]: Accessing Plugin Components
          - text: Once staged and loaded, you can interact with the plugin components inside the CLI using slash commands.
        - heading "Terminal Sandbox" [level=3] [ref=e313]
        - paragraph [ref=e315]: The Terminal Sandbox is a lightweight security isolation mechanism that protects your host system from potentially destructive file manipulations or unauthorized outbound network requests when the agent executes local shell commands.
        - paragraph [ref=e317]:
          - text: Rather than running heavy virtual machines or containers, the CLI leverages native operating system features (
          - code [ref=e318]: nsjail
          - text: on Linux,
          - code [ref=e319]: sandbox-exec
          - text: on macOS, and
          - code [ref=e320]: AppContainer
          - text: on Windows) to enforce strict containment boundaries with zero startup overhead.
        - paragraph [ref=e322]:
          - strong [ref=e323]: Configuration
          - text: You can configure the sandbox behavior in your
          - code [ref=e324]: settings.json
          - text: file (located at
          - code [ref=e325]: ~/.gemini/antigravity-cli/settings.json
          - text: "):"
        - generic [ref=e328]:
          - generic [ref=e330]: json
          - button "content_copy" [ref=e331] [cursor=pointer]
          - code [ref=e334]
        - list [ref=e336]:
          - listitem [ref=e337]:
            - generic [ref=e338]:
              - strong [ref=e339]:
                - code [ref=e340]: enableTerminalSandbox
              - text: "(boolean, default:"
              - code [ref=e341]: "false"
              - text: "): Enables general execution containment barriers on all local agent processes."
        - paragraph [ref=e343]:
          - strong [ref=e344]: Interactive Approvals
          - text: "When the agent proposes a terminal command that requires your confirmation, the CLI prompt adapts dynamically based on your settings:"
        - list [ref=e346]:
          - listitem [ref=e347]:
            - generic [ref=e348]:
              - strong [ref=e349]: When the Sandbox is Enabled
              - text: ":"
            - generic [ref=e350]:
              - text: The confirmation prompt will include a specific option to
              - strong [ref=e351]: Yes, and run without sandbox restrictions
              - text: if you need to temporarily bypass the containment boundary for a single trusted command.
          - listitem [ref=e352]:
            - generic [ref=e353]:
              - strong [ref=e354]: When the Sandbox is Disabled
              - text: ":"
            - generic [ref=e355]:
              - text: The prompt will include an option to
              - strong [ref=e356]: Yes, and run in sandbox
              - text: if you want to force a specific, potentially risky command to execute within the safety boundary.
