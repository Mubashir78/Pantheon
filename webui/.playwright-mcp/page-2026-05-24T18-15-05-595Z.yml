        - 'heading "Advanced Customization via `settings.json`" [level=3] [ref=e458]'
        - paragraph [ref=e460]:
          - text: For power users, several slash commands support deep customization via your
          - code [ref=e461]: ~/.gemini/antigravity-cli/settings.json
          - text: "configuration:"
        - list [ref=e463]:
          - listitem [ref=e464]:
            - generic [ref=e465]:
              - strong [ref=e466]: Fine-Grained Permissions
              - text: ":"
            - text: "Instead of global levels, define specific allowed/denied commands:"
        - generic [ref=e469]:
          - button "content_copy" [ref=e470] [cursor=pointer]
          - code [ref=e473]
        - list [ref=e475]:
          - listitem [ref=e476]:
            - generic [ref=e477]:
              - strong [ref=e478]: Custom Status Line & Window Titles
              - text: ":"
            - text: You can pipe live agent metadata (JSON format containing CWD, active model, token usage, state, etc.) directly into your own custom shell scripts to generate dynamic status bars or terminal window titles.
        - heading "Subagents in Antigravity CLI" [level=3] [ref=e480]
        - paragraph [ref=e482]: Antigravity CLI features an asynchronous subagents framework that allows the main agent to delegate parallel work, perform background research, and run system tests without blocking your active conversation.
        - paragraph [ref=e484]:
          - strong [ref=e485]: What are Subagents?
          - text: Subagents are independent, concurrent agent sessions designed to tackle specific background tasks in parallel with the main conversation.
        - list [ref=e487]:
          - listitem [ref=e488]:
            - generic [ref=e489]:
              - strong [ref=e490]: Purpose
              - text: ":"
            - text: The main agent automatically spawns subagents to perform background operations such as looking up documentation, running builds, or validating a fix.
          - listitem [ref=e491]:
            - generic [ref=e492]:
              - strong [ref=e493]: Capabilities
              - text: ":"
            - text: Subagents have full access to tools such as code search, file editing, terminal commands, and web searches to complete their assigned tasks.
          - listitem [ref=e494]: The main agent decides what tools and permissions subagents get, including whether they can use MCP tools and if they can write files.
        - 'heading "Managing Agents: The `/agents` Panel" [level=3] [ref=e496]'
        - paragraph [ref=e498]: Antigravity CLI provides an interactive terminal UI to view, manage, and approve actions for running subagents.
        - list [ref=e500]:
          - listitem [ref=e501]:
            - generic [ref=e502]:
              - strong [ref=e503]: Access
              - text: ":"
            - generic [ref=e504]:
              - text: Type
              - code [ref=e505]: /agents
              - text: in the prompt to open the subagents panel.
          - listitem [ref=e506]:
            - generic [ref=e507]:
              - strong [ref=e508]: Overview
              - text: ":"
            - text: The panel shows a list of active and completed subagents, including surface-level details such as their status (running, done, killed, etc.) and the current step they are executing.
        - generic [ref=e510]:
          - generic [ref=e511]: info
          - generic [ref=e512]: Selecting a subagent from the panel opens a full-screen detail view. This view shows the entirety of the subagent’s conversation, including its steps, thoughts, and tool execution logs.
        - paragraph [ref=e514]:
          - strong [ref=e515]: Tool Confirmations & Approvals
          - text: "When a subagent wants to execute a tool that requires user permissions (such as running a local command or writing a file), it will surface the request. You can manage approvals in two ways:"
        - list [ref=e517]:
          - listitem [ref=e518]:
            - strong [ref=e520]: Detail View Approvals
        - paragraph [ref=e522]: The Subagent Detail View features an interaction section containing all pending approvals, where you can selectively approve or deny requests.
        - generic [ref=e524]:
          - generic [ref=e525]: lightbulb
          - generic [ref=e526]:
            - strong [ref=e527]: Tip
            - text: ": Use the keyboard shortcut"
            - code [ref=e528]: ctrl+j
            - text: to "teleport" from the main conversation directly to the detailed view of the next subagent waiting for your approval.
        - list [ref=e530]:
          - listitem [ref=e531]:
            - strong [ref=e533]: Fast Path Alerts
        - paragraph [ref=e535]: To keep you in your flow, Antigravity CLI displays a Fast Path Alert directly above your prompt box when a subagent requests permission.
        - generic [ref=e537]:
          - generic [ref=e538]: lightbulb
          - generic [ref=e539]:
            - strong [ref=e540]: Tip
            - text: ": You can approve a pending subagent permission instantly using"
            - code [ref=e541]: ctrl+k
            - text: without ever having to switch away from the main conversation.
