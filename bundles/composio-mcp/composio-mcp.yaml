# ── Composio MCP Server ─────────────────────────────────────────
# Installed by Olympus UI V3 onboarding. The ${VAR} placeholders are
# resolved at Hermes config load time via _expand_env_vars().
# Olympus onboarding sets these env vars after the user authenticates.
# ────────────────────────────────────────────────────────────────
mcp_servers:
  composio:
    url: https://connect.composio.dev/mcp
    timeout: 180
    headers:
      x-consumer-api-key: ${COMPOSIO_CONSUMER_KEY}
      Authorization: Bearer ${COMPOSIO_AUTH_TOKEN}
